<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethan code</title>
    <style>
        body {
            
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 350px;
            text-align: center;
        }

        h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
            font-weight: bold;
        }


        .btn-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-container button {
            flex: 1;
            margin: 10px;
            padding: 12px;
            background-color: #494eea;
            color: #fff;
            border: 0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .btn-container button:hover {
            background-color: #3a36b1;
        }
        
        
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9218865709942607"
    crossorigin="anonymous"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T39RGVQQKB"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-T39RGVQQKB');
    </script>
</head>

<body>
    <div class="container">
        <h3>顏色選擇器</h3>
        <h4>請選擇顏色:</h4>
        <input type="color" id="color_pick">
        
        <div class="btn-container">
            <button onclick="sub()">確定</button>
            <button onclick="return_back()">返回</button>
        </div>
        <h4 id="ouputBox"></h4>
    </div>

    <script>
        

        function sub() {
            let ouputBox = document.getElementById("ouputBox");
            let color = document.getElementById("color_pick").value;
            ouputBox.innerHTML = "顏色:"+color;
        }

        function return_back() {
            location.href = "../../";
        }
    </script>
</body>

</html>
