<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethan code</title>
    <style>
        body {
            
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 350px;
            text-align: center;
        }

        h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
            font-weight: bold;
        }

        p {
            margin-bottom: 10px;
            color: #666;
            font-size: 16px;
        }

        input[type="text"] {
            width: calc(100% - 20px);
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-container button {
            flex: 1;
            margin: 10px;
            padding: 12px;
            background-color: #494eea;
            color: #fff;
            border: 0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .btn-container button:hover {
            background-color: #3a36b1;
        }

        #imgBox {
            margin-top: 20px;
        }

        #qrImage {
            width: 200px;
            border-radius: 5px;
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9218865709942607"
    crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <h3>QR Code Generator</h3>
        <p>請輸入URL以生成QR Code</p>
        <input type="text" id="qrText" placeholder="輸入URL">
        <div class="btn-container">
            <button onclick="generateQR()">生成QR Code</button>
            <button onclick="return_back()">返回</button>
        </div>
        <div id="imgBox">
            <img src="" alt="" id="qrImage">
        </div>
    </div>

    <script>
        let imgBox = document.getElementById("imgBox");
        let qrImage = document.getElementById("qrImage");
        let qrText = document.getElementById("qrText");

        function generateQR() {
            // 檢查是否輸入了URL
            if (!qrText.value.trim()) {
                alert("請輸入有效的URL");
                return;
            }

            let url = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(qrText.value);
            qrImage = document.createElement("img");
            qrImage.src = url;
            qrImage.alt = "QR Code";
            qrImage.id = "qrImage";
            imgBox.innerHTML = "";
            imgBox.appendChild(qrImage);
        }

        function return_back() {
            location.href = "../../"
        }
    </script>
</body>

</html>
